<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SentenceFlow · 英语造句</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1e2a22;--ink-2:#3d4f44;--ink-3:#7a9080;
  --paper:#f4faf6;--paper-2:#e8f4ec;--paper-3:#d4eadb;
  --primary:#2e7d5a;--primary-light:#e4f5ec;--primary-dark:#1d5c41;
  --accent:#3a7ab8;--accent-light:#e8f2fb;
  --warn:#c17a2a;--warn-light:#fef3e2;
  --red:#c0392b;--red-light:#fde8e8;
  --radius:14px;
  --shadow:0 2px 12px rgba(30,42,34,.07);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── API Setup overlay ── */
.api-setup{position:fixed;inset:0;background:rgba(20,34,26,.6);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px)}
.api-modal{background:#f8fdf9;border-radius:22px 22px 0 0;padding:24px 18px 36px;width:100%;max-height:85vh;overflow-y:auto;position:relative}
.api-modal h2{font-family:'Instrument Serif',serif;font-size:22px;color:var(--ink);margin-bottom:8px}
.api-modal>p{font-size:13px;color:var(--ink-3);line-height:1.65;margin-bottom:16px}
#apiAlreadyConfigured{display:none;margin-bottom:14px;padding:10px 14px;background:#e4f5ec;border-radius:10px;border-left:3px solid var(--primary);font-size:13px;color:var(--primary-dark)}
#apiCloseBtn{display:none;position:absolute;top:14px;right:16px;background:none;border:none;font-size:22px;color:var(--ink-3);cursor:pointer;padding:4px 8px;border-radius:6px}
.provider-tab{padding:7px 13px;border:1.5px solid rgba(46,125,90,.14);border-radius:20px;background:var(--paper-2);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--ink-2);transition:all .15s}
.provider-tab.active{background:var(--primary);color:white;border-color:var(--primary)}
.api-modal input[type=password],.api-modal input[type=text]{width:100%;padding:11px 14px;border:1.5px solid var(--paper-3);border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;background:white;color:var(--ink);margin-bottom:10px;outline:none}
.api-modal input:focus{border-color:var(--primary)}
.api-actions{display:flex;gap:8px;margin-top:4px}
.api-secondary{flex:1;padding:11px;border:1.5px solid var(--paper-3);border-radius:10px;background:white;color:var(--ink-2);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif}
.api-submit{flex:1;padding:11px;background:var(--primary);color:white;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.api-note{font-size:12px;color:var(--ink-3);margin-top:10px;line-height:1.6}
.api-note a{color:var(--primary)}
#providerHint{font-size:12px;color:var(--ink-3);margin-bottom:10px;line-height:1.5}

/* ── Header ── */
header{padding:12px 16px;border-bottom:1px solid var(--paper-3);display:flex;align-items:center;justify-content:space-between;background:white;position:sticky;top:0;z-index:40;box-shadow:0 1px 0 var(--paper-3)}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:28px;height:28px;border-radius:9px;background:linear-gradient(155deg,#245e45,#173f4d);border:1px solid rgba(17,52,38,.42);box-shadow:inset 0 1px 0 rgba(255,255,255,.16),0 6px 14px rgba(20,51,39,.22);position:relative;flex-shrink:0}
.logo-mark::after{content:"";position:absolute;left:7px;top:7px;width:8px;height:13px;border-radius:7px 7px 3px 7px;background:linear-gradient(180deg,rgba(242,251,245,.95),rgba(208,236,221,.92));transform:rotate(-26deg)}
.logo-title{font-family:'Instrument Serif',serif;font-size:18px;letter-spacing:.01em}
.logo-subtitle{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3)}
.header-right{display:flex;align-items:center;gap:8px}
.api-status-btn{font-size:11px;color:var(--primary);padding:5px 10px;border:1.5px solid rgba(46,125,90,.16);border-radius:16px;background:var(--primary-light);cursor:pointer;white-space:nowrap}

/* ── Main ── */
main{padding:16px 16px 100px;display:flex;flex-direction:column;gap:14px}

/* ── Topic section ── */
.section-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);margin-bottom:8px}
.level-tabs{display:flex;gap:6px;margin-bottom:14px}
.level-tab{padding:7px 16px;border:1.5px solid var(--paper-3);border-radius:20px;background:white;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--ink-2);transition:all .15s}
.level-tab.active{background:var(--primary);color:white;border-color:var(--primary)}
.topic-card{background:white;border:1.5px solid var(--paper-3);border-radius:var(--radius);padding:14px 14px 12px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;box-shadow:var(--shadow)}
.topic-text{font-family:'Instrument Serif',serif;font-size:18px;line-height:1.45;color:var(--ink);flex:1}
.topic-badge{font-size:10px;padding:3px 8px;border-radius:12px;background:var(--primary-light);color:var(--primary-dark);font-weight:500;white-space:nowrap;margin-top:3px;flex-shrink:0}
.new-topic-btn{display:none}

/* ── Mode tabs ── */
.mode-tabs{display:flex;background:var(--paper-2);border-radius:10px;padding:3px;gap:2px;margin-bottom:12px}
.mode-tab{flex:1;padding:8px 8px;border:none;background:transparent;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--ink-3);border-radius:8px;transition:all .15s;white-space:nowrap}
.mode-tab.active{background:white;color:var(--primary);font-weight:500;box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* ── Input area ── */
.input-wrap{background:white;border:1.5px solid var(--paper-3);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
#sentenceInput{width:100%;min-height:100px;padding:14px 14px 10px;border:none;font-size:15px;line-height:1.65;font-family:'DM Sans',sans-serif;color:var(--ink);resize:none;background:transparent;outline:none}
.input-footer{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-top:1px solid var(--paper-2);background:var(--paper)}
.char-count{font-size:11px;color:var(--ink-3)}
.submit-btn{display:flex;align-items:center;gap:6px;padding:9px 20px;background:var(--primary);color:white;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.submit-btn:disabled{opacity:.55;cursor:not-allowed}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:none;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Demo strip ── */
.demo-strip{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:10px 0 2px}
.demo-strip-label{font-size:11px;color:var(--ink-3);white-space:nowrap}
.demo-chip{padding:5px 12px;border:1px solid var(--paper-3);border-radius:20px;background:white;font-size:12px;color:var(--ink-2);cursor:pointer;font-family:'DM Sans',sans-serif;text-align:left;line-height:1.4}

/* ── Feedback card ── */
.feedback-card{display:none;background:white;border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--paper-3);overflow:hidden}
.feedback-card.show{display:block}
.feedback-card.good .feedback-header{background:linear-gradient(135deg,#2e7d5a,#1d5c41)}
.feedback-card.improve .feedback-header{background:linear-gradient(135deg,#c17a2a,#9a5e1c)}
.feedback-card.error .feedback-header{background:linear-gradient(135deg,#c0392b,#962d22)}
.feedback-header{padding:14px 16px;color:white;display:flex;align-items:center;justify-content:space-between;font-size:15px;font-weight:500}
.score-badge{background:rgba(255,255,255,.2);padding:3px 10px;border-radius:12px;font-size:13px}
.feedback-body{padding:16px;display:flex;flex-direction:column;gap:14px}
.feedback-section-title{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin-bottom:8px}
.corrected-block{background:var(--primary-light);border-radius:10px;padding:13px 14px;border-left:3px solid var(--primary)}
.corrected-en{font-family:'DM Mono',monospace;font-size:14px;line-height:1.7;color:var(--primary-dark);margin-bottom:5px}
.corrected-zh{font-size:13px;color:var(--ink-2);line-height:1.6;margin-bottom:8px}
.speak-btn{padding:6px 14px;border-radius:20px;border:1.5px solid;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;background:white}
.speak-btn.green{border-color:var(--primary);color:var(--primary)}
.speak-btn.blue{border-color:var(--accent);color:var(--accent)}
.speak-btn.purple{border-color:#6b3fa0;color:#6b3fa0}
.errors-list{list-style:none;display:flex;flex-direction:column;gap:7px}
.error-item{font-size:13px;color:var(--ink-2);line-height:1.65;padding:9px 12px;background:var(--red-light);border-radius:8px;border-left:3px solid var(--red)}
.explanation{font-size:13px;line-height:1.8;color:var(--ink-2);padding:11px 13px;background:var(--paper-2);border-radius:10px}
.grammar-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.grammar-tag{font-size:11px;padding:3px 9px;border-radius:12px;background:var(--accent-light);color:var(--accent);border:1px solid rgba(58,122,184,.2)}
.native-block{background:var(--accent-light);border-radius:10px;padding:13px 14px;border-left:3px solid var(--accent)}
.native-en{font-family:'DM Mono',monospace;font-size:14px;line-height:1.7;color:#1a4a7a;margin-bottom:5px}
.native-zh{font-size:13px;color:var(--ink-2);line-height:1.6;margin-bottom:8px}
.grammar-lesson-card{background:white;border:1px solid var(--paper-3);border-radius:10px;overflow:hidden;margin-top:2px}
.gl-header{padding:10px 13px;font-size:12px;font-weight:600;color:white;background:var(--primary)}
.gl-body{padding:12px 13px;display:flex;flex-direction:column;gap:8px}
.gl-rule{font-size:13px;color:var(--ink-2);line-height:1.75}
.gl-mnemonic{font-size:13px;color:var(--warn);font-style:italic;line-height:1.65;padding:8px 11px;background:var(--warn-light);border-radius:8px}
.gl-example-row{display:flex;gap:8px;align-items:flex-start;padding:7px 0;border-bottom:1px dashed var(--paper-3)}
.gl-example-row:last-child{border-bottom:none}
.gl-wrong{font-family:'DM Mono',monospace;font-size:12px;color:var(--red);background:var(--red-light);padding:3px 8px;border-radius:5px;white-space:nowrap}
.gl-right{font-family:'DM Mono',monospace;font-size:12px;color:var(--primary-dark);background:var(--primary-light);padding:3px 8px;border-radius:5px;white-space:nowrap}
.gl-extra-en{font-family:'DM Mono',monospace;font-size:12px;color:var(--ink);line-height:1.55}
.gl-extra-zh{font-size:11px;color:var(--ink-3);line-height:1.5;margin-top:2px}
.next-tips{font-size:13px;line-height:1.8;color:var(--ink-2);padding:11px 13px;background:var(--paper-2);border-radius:10px;white-space:pre-line}
.save-sentence-btn{width:100%;padding:10px;background:var(--primary-light);color:var(--primary-dark);border:1.5px solid rgba(46,125,90,.2);border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.save-sentence-btn.saved{background:var(--primary);color:white}
.demo-note-box{font-size:12px;color:var(--ink-3);background:var(--paper-2);border-radius:8px;padding:10px 12px;margin-bottom:10px;line-height:1.65}

/* ── Lookup result ── */
.lookup-result{display:none;background:white;border-radius:var(--radius);border:1px solid var(--paper-3);overflow:hidden;box-shadow:var(--shadow)}
.lookup-result.show{display:block}
.lookup-header{display:flex;align-items:flex-start;justify-content:space-between;padding:14px 15px 10px;border-bottom:1px solid var(--paper-2)}
.lookup-word{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;color:var(--ink)}
.lookup-pron{font-size:12px;color:var(--ink-3);font-family:'DM Mono',monospace;margin-top:2px}
.lookup-speak-btn{padding:7px 14px;border-radius:20px;border:1.5px solid var(--primary);color:var(--primary);background:white;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}
.lookup-body{padding:14px 15px;display:flex;flex-direction:column;gap:12px}
.lookup-section-title{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin-bottom:7px}
.lookup-def-item{display:flex;gap:8px;align-items:flex-start;margin-bottom:6px}
.lookup-pos{font-size:11px;padding:2px 7px;border-radius:10px;background:var(--primary-light);color:var(--primary-dark);font-weight:600;white-space:nowrap;margin-top:2px;flex-shrink:0}
.lookup-def-text{font-size:14px;color:var(--ink);line-height:1.55}
.lookup-example{font-size:13px;color:var(--ink-2);line-height:1.7;padding:9px 12px;background:var(--paper-2);border-radius:8px;font-style:italic}
.lookup-synonyms{display:flex;gap:6px;flex-wrap:wrap}
.lookup-synonym{padding:5px 12px;border:1px solid var(--paper-3);border-radius:20px;background:white;font-size:12px;color:var(--ink-2);cursor:pointer;font-family:'DM Sans',sans-serif}
.lookup-save-btn{width:100%;padding:10px;background:var(--primary-light);color:var(--primary-dark);border:1.5px solid rgba(46,125,90,.2);border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.lookup-save-btn.saved{background:var(--primary);color:white}
.gc-mnemonic{font-size:13px;color:var(--warn);font-style:italic;line-height:1.65;padding:9px 12px;background:var(--warn-light);border-radius:8px}

/* ── Translate result ── */
.translate-result{display:none;background:white;border-radius:var(--radius);border:1px solid var(--paper-3);overflow:hidden;box-shadow:var(--shadow)}
.translate-result.show{display:block}
.translate-header{padding:12px 15px;font-size:13px;font-weight:500;color:var(--ink);border-bottom:1px solid var(--paper-2)}
.translate-body{padding:12px 15px;display:flex;flex-direction:column;gap:10px}
.translate-variant{border-radius:10px;overflow:hidden;border:1px solid var(--paper-3)}
.translate-variant-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:7px 12px;background:var(--paper-2);color:var(--ink-3)}
.style-standard .translate-variant-label{background:var(--primary-light);color:var(--primary-dark)}
.style-casual .translate-variant-label{background:var(--accent-light);color:#1a4a7a}
.style-formal .translate-variant-label{background:#f0eafa;color:#4a2d7a}
.translate-text{padding:10px 12px 4px;font-size:14px;line-height:1.7;color:var(--ink)}
.translate-note{padding:4px 12px 8px;font-size:12px;color:var(--ink-3)}
.translate-speak{margin:4px 12px 10px;padding:6px 14px;border-radius:20px;border:1.5px solid var(--primary);color:var(--primary);background:white;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}

/* ── Word popup ── */
.word-popup{position:fixed;z-index:500;background:white;border:1.5px solid var(--paper-3);border-radius:14px;padding:14px 15px;width:calc(100vw - 32px);max-width:340px;max-height:65vh;overflow-y:auto;box-shadow:0 12px 32px rgba(30,42,34,.18);display:none}
.wp-word{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;color:var(--ink)}
.wp-pron{font-size:11px;color:var(--ink-3);font-family:'DM Mono',monospace;margin-bottom:7px}
.wp-def{color:var(--ink-2);font-size:13px;line-height:1.65}
.wp-ex{font-size:12px;color:var(--ink-3);font-style:italic;line-height:1.6;margin-top:6px;padding:8px 10px;background:var(--paper-2);border-radius:7px;display:none}
.wp-actions{display:flex;gap:7px;margin-top:9px}
.wp-btn{flex:1;padding:8px;border-radius:7px;border:none;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500}
.wp-speak{background:var(--accent-light);color:var(--accent)}
.wp-save{background:var(--primary-light);color:var(--primary-dark)}
.word-token{cursor:pointer;border-radius:3px;padding:0 2px;transition:background .12s}
.word-token.blue{color:#1a4a7a}
.word-token.green{color:var(--primary-dark)}
.word-token.purple{color:#4a2d7a}

/* ── Bottom sidebar ── */
.sidebar-toggle{position:fixed;bottom:20px;left:16px;z-index:100;background:var(--primary);color:white;border:none;padding:10px 16px;border-radius:24px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;box-shadow:0 4px 16px rgba(46,125,90,.32);display:flex;align-items:center;gap:6px}
.back-btn{position:fixed;bottom:20px;right:16px;z-index:100;background:rgba(17,17,16,.8);color:#fff;border:none;padding:10px 16px;border-radius:24px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;backdrop-filter:blur(8px);box-shadow:0 4px 16px rgba(0,0,0,.2)}
.sidebar-sheet{position:fixed;inset:0;z-index:150;display:none}
.sidebar-sheet.show{display:block}
.sidebar-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.4)}
.sidebar-panel{position:absolute;bottom:0;left:0;right:0;background:white;border-radius:20px 20px 0 0;max-height:72vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 -8px 32px rgba(0,0,0,.15)}
.sidebar-handle{width:36px;height:4px;border-radius:2px;background:var(--paper-3);margin:12px auto 8px;flex-shrink:0}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--paper-3);flex-shrink:0}
.sidebar-tab{flex:1;padding:11px;border:none;background:transparent;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--ink-3);border-bottom:2px solid transparent}
.sidebar-tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:500}
.tab-panel{display:none;flex-direction:column;flex:1;overflow:hidden}
.tab-panel.active{display:flex}
.sidebar-header{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--paper-3);flex-shrink:0}
.sidebar-title{font-size:13px;font-weight:500;color:var(--ink)}
.clear-btn{font-size:11px;color:var(--ink-3);background:none;border:none;cursor:pointer;padding:3px 8px;border-radius:5px}
.item-list{flex:1;overflow-y:auto;padding:10px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100px;gap:6px;color:var(--ink-3)}
.empty-icon{font-size:24px}
.empty-text{font-size:12px;text-align:center;line-height:1.5}
.export-area{padding:10px 14px;border-top:1px solid var(--paper-3);flex-shrink:0}
.export-btn{width:100%;padding:9px;background:var(--primary);color:white;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif}

/* ── Saved items ── */
.saved-sentence-card{position:relative;background:white;border:1px solid var(--paper-3);border-radius:9px;padding:10px 12px;margin-bottom:7px}
.sc-en{font-family:'DM Mono',monospace;font-size:12px;color:var(--ink);line-height:1.55;margin-bottom:3px}
.sc-corrected{font-family:'DM Mono',monospace;font-size:12px;color:var(--primary-dark);line-height:1.55;margin-bottom:2px}
.sc-meta{font-size:10px;color:var(--ink-3);margin-top:5px;display:flex;gap:8px;flex-wrap:wrap}
.vocab-card{position:relative;background:white;border:1px solid var(--paper-3);border-radius:9px;padding:10px 12px;margin-bottom:7px}
.vc-word{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:var(--ink);margin-bottom:2px}
.vc-def{font-size:12px;color:var(--ink-2);line-height:1.5}
.vc-meta{display:flex;align-items:center;justify-content:space-between;margin-top:5px}
.vc-date{font-size:10px;color:var(--ink-3)}
.del-btn{position:absolute;top:7px;right:7px;background:none;border:none;color:var(--ink-3);cursor:pointer;font-size:14px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%}

/* ── Toast ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:rgba(20,34,26,.92);color:white;padding:9px 18px;border-radius:20px;font-size:13px;opacity:0;transition:all .3s;pointer-events:none;z-index:700;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--paper-3);border-radius:2px}
</style>
</head>
<body>

<!-- API Modal -->
<div class="api-setup" id="apiSetup" style="display:none">
  <div class="api-modal" style="position:relative">

<script>
// ── Config ─────────────────────────────────────────────────────────────────
const PROVIDERS = {
  openai: { name:'ChatGPT',  placeholder:'sk-...',           hint:'GPT-4o mini，效果好且便宜',           note:'获取：<a href="https://platform.openai.com/api-keys" target="_blank">platform.openai.com</a>', model:'gpt-4o-mini',               url:'https://api.openai.com/v1/chat/completions' },
  gemini: { name:'Gemini',   placeholder:'AIzaSy...',        hint:'Gemini 1.5 Flash，每天免费 1500 次',  note:'获取：<a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com</a>',  model:'gemini-2.0-flash',          url:null },
  qwen:   { name:'通义千问', placeholder:'sk-...',           hint:'Qwen-Turbo，国内访问快，有免费额度',  note:'获取：<a href="https://bailian.console.aliyun.com/" target="_blank">阿里云百炼平台</a>',        model:'qwen-turbo', url:'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions' },
  glm:    { name:'智谱 GLM', placeholder:'智谱 API Key',      hint:'GLM-4-Flash，国内访问快，有免费额度', note:'获取：<a href="https://open.bigmodel.cn" target="_blank">open.bigmodel.cn</a>',             model:'glm-4-flash',               url:'https://open.bigmodel.cn/api/paas/v4/chat/completions' },
  claude: { name:'Claude',   placeholder:'sk-ant-api03-...', hint:'Claude Haiku，速度快费用低',          note:'获取：<a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>',   model:'claude-haiku-4-5-20251001', url:'https://api.anthropic.com/v1/messages' },
  custom: { name:'兼容接口', placeholder:'API Key',          hint:'兼容 OpenAI 格式：DeepSeek / Moonshot / Ollama 等', note:'填写接口地址和模型名', model:'', url:'' },
};
const TOPICS = {
  '初级': ['描述你昨天做了什么','说说你最喜欢的食物，以及为什么','描述你的早晨例行公事','描述你喜欢的一个周末活动','描述你的城市或家乡','说说你最喜欢的季节'],
  '中级': ['描述你理想中的工作环境','描述一次让你印象深刻的旅行','说说你如何保持工作与生活的平衡','描述你最近学到的一件有趣的事','谈谈你对远程工作的看法','描述一个你钦佩的人'],
  '高级': ['谈谈人工智能对社会的影响','说说创业公司和大公司各自的优缺点','谈谈社交媒体如何影响人际关系','讨论气候变化对未来经济的影响','谈谈教育系统应如何适应 AI 时代'],
};
const DEMO_INPUTS = {
  practice: 'I want improve my English because I want speak better in work.',
  lookup: 'acquire',
  translate: '我想在工作里更自然地说英语。'
};

// ── State ──────────────────────────────────────────────────────────────────
let currentProvider = 'openai';
let currentLevel    = '中级';
let currentMode     = 'practice';   // 'practice' | 'lookup' | 'translate'
let currentTopic    = null;
let currentFeedback = null;
let sentences       = [];
let vocab           = [];
let popupWord       = null;
let wordCache       = {};


// ── Storage Shim (works in data: URI iframes where localStorage is blocked) ──
const _store = {};
const _safeStorage = {
  getItem(k) { try { const v = localStorage.getItem(k); if (v !== null) return v; return _store[k] ?? null; } catch(e) { return _store[k] ?? null; } },
  setItem(k, v) { try { localStorage.setItem(k, v); } catch(e) {} _store[k] = String(v); },
  removeItem(k) { try { localStorage.removeItem(k); } catch(e) {} delete _store[k]; }
};

// ── Init ───────────────────────────────────────────────────────────────────
window.onload = () => {
  selectProvider(_safeStorage.getItem('sf_provider') || 'openai');
  // 预填已保存的 key（掩码显示）
  const _savedKey = _safeStorage.getItem('sf_api_key') || '';
  if (_savedKey) {
    const _masked = _savedKey.slice(0,6) + '••••••••' + _savedKey.slice(-4);
    document.getElementById('apiKeyInput').placeholder = _masked + '（已配置，直接保存即可）';
  }
  setLevel(_safeStorage.getItem('sf_level') || '中级', false);
  loadSentences(); loadVocab(); newTopic(); updateStats(); updateProviderBadge();
  renderDemoStrip();

  // Word popup buttons — wire once, no inline onclick
  document.getElementById('wpSpeakBtn').onclick = () => { if (popupWord) speakText(popupWord); };
  document.getElementById('wpSaveBtn').onclick  = saveCurrentWord;

  // Close popup on outside click
  document.addEventListener('click', e => {
    const popup = document.getElementById('wordPopup');
    if (popup.style.display !== 'none' && !popup.contains(e.target) && !e.target.classList.contains('word-token')) {
      popup.style.display = 'none';
    }
  });

  window.speechSynthesis && initVoices();
};

// ── Provider ───────────────────────────────────────────────────────────────
function selectProvider(p) {
  currentProvider = p;
  document.querySelectorAll('.provider-tab').forEach(t => t.classList.toggle('active', t.dataset.p === p));
  const cfg = PROVIDERS[p];
  document.getElementById('apiKeyInput').placeholder   = cfg.placeholder;
  document.getElementById('providerHint').textContent  = cfg.hint;
  document.getElementById('apiNote').innerHTML         = cfg.note;
  document.getElementById('customUrlWrap').style.display   = p==='custom'?'block':'none';
  document.getElementById('customModelWrap').style.display = p==='custom'?'block':'none';
}
function saveApiKey() {
  const existingKey = _safeStorage.getItem('sf_api_key') || '';
  const inputVal = document.getElementById('apiKeyInput').value.trim();
  // If input is empty but we already have a key saved, just close
  if (!inputVal && existingKey) {
    document.getElementById('apiSetup').style.display = 'none';
    updateProviderBadge();
    return;
  }
  const key = inputVal;
  if (!key || key.length < 8) { showToast('请填写有效的 API Key'); return; }
  if (currentProvider === 'custom') {
    const url = document.getElementById('customUrlInput').value.trim();
    if (!url) { showToast('请填写 API 地址'); return; }
    _safeStorage.setItem('sf_custom_url', url);
    _safeStorage.setItem('sf_custom_model', document.getElementById('customModelInput').value.trim());
  }
  _safeStorage.setItem('sf_api_key', key);
  _safeStorage.setItem('sf_provider', currentProvider);
  closeApiSetup();
  updateProviderBadge();
  showToast('服务已接入，现在可以开始生成结果');
}
function openApiSetup() {
  document.getElementById('apiSetup').style.display = 'flex';
  const existingKey = _safeStorage.getItem('sf_api_key') || '';
  const closeBtn = document.getElementById('apiCloseBtn');
  if (closeBtn) closeBtn.style.display = existingKey ? 'block' : 'none';
}
function closeApiSetup() {
  document.getElementById('apiSetup').style.display = 'none';
}
function resetApiKey() {
  document.getElementById('apiKeyInput').value = '';
  selectProvider(_safeStorage.getItem('sf_provider') || 'openai');
  document.getElementById('apiSetup').style.display = 'flex';
  const existingKey = _safeStorage.getItem('sf_api_key') || '';
  const closeBtn = document.getElementById('apiCloseBtn');
  const configuredDiv = document.getElementById('apiAlreadyConfigured');
  const configuredInfo = document.getElementById('apiConfiguredInfo');
  if (existingKey && closeBtn) {
    closeBtn.style.display = 'block';
    if (configuredDiv) {
      const providerName = PROVIDERS[_safeStorage.getItem('sf_provider')||'openai']?.name || '';
      configuredInfo.textContent = providerName + ' · ' + existingKey.slice(0,6) + '••••' + existingKey.slice(-4);
      configuredDiv.style.display = 'block';
    }
  }
}
function closeApiSetup() {
  document.getElementById('apiSetup').style.display = 'none';
}
function updateProviderBadge() {
  const hasApi = !!_safeStorage.getItem('sf_api_key');
  document.getElementById('providerBadge').textContent = hasApi
    ? (PROVIDERS[_safeStorage.getItem('sf_provider')||'openai']?.name || '-')
    : '未设置';
}

// ── Level & Topic ──────────────────────────────────────────────────────────
function setLevel(lv, refresh) {
  currentLevel = lv;
  _safeStorage.setItem('sf_level', lv);
  document.querySelectorAll('.level-tab').forEach(t => t.classList.toggle('active', t.dataset.lv === lv));
  if (refresh !== false) newTopic();
}
function newTopic() {
  const pool = TOPICS[currentLevel] || TOPICS['中级'];
  const text = pool[Math.floor(Math.random() * pool.length)];
  currentTopic = { text, level: currentLevel };
  document.getElementById('topicText').textContent  = text;
  document.getElementById('topicLevel').textContent = currentLevel;
}

// ── Mode ───────────────────────────────────────────────────────────────────
const MODE_CONFIG = {
  practice:  { placeholder:'Try writing a sentence in English... 不用追求完美，随便写就行', btn:'AI 纠正', hint:'Enter 提交' },
  lookup:    { placeholder:'输入一个英文单词，例如：acquire',                               btn:'查  词',  hint:'Enter 查询' },
  translate: { placeholder:'输入中文或英文句子，自动识别并翻译…',                           btn:'翻  译',  hint:'Enter 翻译' },
};

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  const cfg = MODE_CONFIG[mode];
  const inp = document.getElementById('sentenceInput');
  inp.placeholder = cfg.placeholder;
  inp.value = '';
  document.getElementById('submitText').textContent = cfg.btn;
  document.getElementById('charCount').textContent  = '0 字符 · ' + cfg.hint;
  document.getElementById('feedbackCard').classList.remove('show');
  document.getElementById('lookupResult').classList.remove('show');
  document.getElementById('translateResult').classList.remove('show');
  document.getElementById('topicSection').style.display = mode === 'practice' ? '' : 'none';
  renderDemoStrip();
  inp.focus();
}
function renderDemoStrip() {
  const strip = document.getElementById('demoStrip');
  if (!strip) return;
  const sample = DEMO_INPUTS[currentMode];
  strip.innerHTML = `
    <span class="demo-strip-label">试用样例</span>
    <button class="demo-chip" onclick="useDemoSample('${currentMode}')">${sample}</button>
  `;
}
function useDemoSample(mode) {
  if (mode && currentMode !== mode) setMode(mode);
  const sample = DEMO_INPUTS[currentMode];
  document.getElementById('sentenceInput').value = sample;
  updateCharCount();
  document.getElementById('sentenceInput').focus();
}

// ── Input ──────────────────────────────────────────────────────────────────
function updateCharCount() {
  const len  = document.getElementById('sentenceInput').value.length;
  const hint = MODE_CONFIG[currentMode]?.hint || 'Enter 提交';
  document.getElementById('charCount').textContent = len + ' 字符 · ' + hint;
}
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSubmit(); }
}
function handleSubmit() {
  if (currentMode === 'lookup')    lookupWord();
  else if (currentMode === 'translate') translateText();
  else submitSentence();
}

// ── AI call ────────────────────────────────────────────────────────────────
async function callAI(prompt) {
  const apiKey   = _safeStorage.getItem('sf_api_key');
  const provider = _safeStorage.getItem('sf_provider') || 'openai';

  if (provider === 'gemini') {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ contents:[{parts:[{text:prompt}]}], generationConfig:{temperature:0.3,maxOutputTokens:1200} })
    });
    const d = await res.json();
    if (d.error) throw new Error(d.error.message);
    return d.candidates[0].content.parts[0].text;
  }
  if (provider === 'claude') {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({ model:PROVIDERS.claude.model, max_tokens:1200, messages:[{role:'user',content:prompt}] })
    });
    const d = await res.json();
    if (d.error) throw new Error(d.error.message);
    return d.content[0].text;
  }
  const cfg = provider==='custom'
    ? {url:_safeStorage.getItem('sf_custom_url'), model:_safeStorage.getItem('sf_custom_model')||'gpt-4o-mini'}
    : PROVIDERS[provider];
  const res = await fetch(cfg.url, {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
    body: JSON.stringify({ model:cfg.model, max_tokens:1200, temperature:0.3, messages:[{role:'user',content:prompt}] })
  });
  const d = await res.json();
  if (d.error) throw new Error(d.error.message||JSON.stringify(d.error));
  return d.choices[0].message.content;
}

// ── Lookup Word ────────────────────────────────────────────────────────────
async function lookupWord() {
  const word = document.getElementById('sentenceInput').value.trim();
  if (!word) { showToast('请输入要查询的单词'); return; }
  if (!_safeStorage.getItem('sf_api_key')) {
    renderLookup(getDemoLookup(word));
    showToast('当前展示的是试用效果；接入 API 后可查询你自己的真实单词结果');
    return;
  }

  setLoading(true, '查询中...');
  const prompt = `查询英文单词 "${word}"，以 JSON 格式返回（不要 markdown）：
{
  "word": "<单词原形>",
  "pronunciation": "<国际音标>",
  "definitions": [
    {"pos": "<词性缩写，如 n./v./adj.>", "en": "<英文释义>", "zh": "<中文释义>"}
  ],
  "example": "<一个简短地道的英文例句>",
  "example_zh": "<例句的中文翻译>",
  "synonyms": ["<近义词1>", "<近义词2>", "<近义词3>"],
  "memory_tip": {
    "method": "<使用的记忆方法，从以下选一个最适合此单词的：谐音联想法 / 词根拆解法 / 场景故事法 / 对比记忆法>",
    "content": "<具体的记忆内容，要非常具体生动。谐音联想法：说出发音像什么中文词，联想到什么画面；词根拆解法：拆开每个词根/前缀/后缀，解释含义，串联成意思；场景故事法：用一句有画面感的中文故事串联单词含义；对比记忆法：找一个容易混淆的近似词，说清楚区别>",
    "one_line": "<一句话总结，简短好记，例如：'ac-快儿-e → 啊快去获得它！'>"
  }
}`;

  try {
    const raw  = await callAI(prompt);
    const data = JSON.parse(raw.replace(/```json|```/g,'').trim());
    renderLookup(data);
  } catch(err) {
    showToast('查询失败：' + err.message);
  }
  setLoading(false, '查  词');
}

function renderLookup(d) {
  document.getElementById('lkWord').textContent = d.word || '';
  document.getElementById('lkPron').textContent = d.pronunciation || '';
  document.getElementById('lkSpeakBtn').onclick = () => speakText(d.word);

  const body = document.getElementById('lkBody');
  body.innerHTML = '';
  if (d._demo) {
    const demoNote = document.createElement('div');
    demoNote.className = 'demo-note-box';
    demoNote.textContent = '当前是试用展示结果，用来让你先看单词卡、例句和记忆技巧会怎么展开。接入 API 后，才会真正按你输入的单词查询。';
    body.appendChild(demoNote);
  }

  // 词义
  if (d.definitions?.length) {
    const defDiv = document.createElement('div');
    defDiv.innerHTML = `<div class="lookup-section-title">词义</div>` +
      d.definitions.map(def => `
        <div class="lookup-def-item">
          <span class="lookup-pos">${def.pos||'n.'}</span>
          <div>
            <div class="lookup-def-text">${def.zh||''}</div>
            <div class="lookup-def-zh" style="color:var(--ink-3);font-size:12px">${def.en||''}</div>
          </div>
        </div>`).join('');
    body.appendChild(defDiv);
  }

  // 例句
  if (d.example) {
    const exDiv = document.createElement('div');
    exDiv.innerHTML = `
      <div class="lookup-section-title">例句</div>
      <div class="lookup-example" id="lkExample">${d.example}</div>
      <div style="font-size:13px;color:var(--ink-3);margin-top:5px;padding:0 4px">${d.example_zh||''}</div>
      <button class="speak-btn green" style="margin-top:8px" id="lkExSpeak">朗读例句</button>`;
    body.appendChild(exDiv);
    document.getElementById('lkExSpeak').addEventListener('click', () => speakText(d.example));
  }

  // 记忆技巧
  if (d.memory_tip) {
    const tip = d.memory_tip;
    const tipDiv = document.createElement('div');
    // 兼容旧版（字符串）和新版（对象）
    if (typeof tip === 'string') {
      tipDiv.innerHTML = `
        <div class="lookup-section-title">记忆技巧</div>
        <div class="gc-mnemonic" style="margin-bottom:0">
          <div class="gc-mnemonic-text">${tip}</div>
        </div>`;
    } else {
      const methodColors = {
        '谐音联想法': '#1e6fb8',
        '词根拆解法': '#2e7d5a',
        '场景故事法': '#6b3fa0',
        '对比记忆法': '#c17a2a',
      };
      const color = methodColors[tip.method] || '#2e7d5a';
      tipDiv.innerHTML = `
        <div class="lookup-section-title">记忆技巧</div>
        <div style="border-radius:10px;overflow:hidden;border:1.5px solid ${color}30">
          <div style="background:${color};color:white;padding:7px 14px;font-size:12px;font-weight:600;letter-spacing:.08em">
            ${tip.method || '记忆技巧'}
          </div>
          <div style="padding:12px 14px;background:white">
            <div style="font-size:14px;color:var(--ink-2);line-height:1.8;margin-bottom:10px">${tip.content||''}</div>
            ${tip.one_line ? `<div style="background:${color}15;border-left:3px solid ${color};border-radius:6px;padding:8px 12px;font-size:14px;font-weight:500;color:${color}">${tip.one_line}</div>` : ''}
          </div>
        </div>`;
    }
    body.appendChild(tipDiv);
  }

  // 近义词
  if (d.synonyms?.length) {
    const synDiv = document.createElement('div');
    synDiv.innerHTML = `<div class="lookup-section-title">近义词</div><div class="lookup-synonyms"></div>`;
    body.appendChild(synDiv);
    const synWrap = synDiv.querySelector('.lookup-synonyms');
    d.synonyms.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'lookup-synonym';
      btn.textContent = s;
      btn.addEventListener('click', () => {
        document.getElementById('sentenceInput').value = s;
        lookupWord();
      });
      synWrap.appendChild(btn);
    });
  }

  // 保存按钮
  const saveDiv = document.createElement('div');
  const saveBtn = document.createElement('button');
  saveBtn.className = 'lookup-save-btn';
  saveBtn.textContent = '保存到单词本';
  saveBtn.addEventListener('click', () => {
    const existing = vocab.find(v => v.word.toLowerCase() === (d.word||'').toLowerCase());
    if (existing) { existing.lookups = (existing.lookups||1)+1; saveVocab(); renderVocab(); showToast('已在单词本，查询次数 +1'); return; }
    vocab.unshift({
      id: Date.now(), word: d.word,
      pronunciation: d.pronunciation || '',
      definition: d.definitions?.map(def=>def.zh).join('；') || '',
      example: d.example || '',
      date: new Date().toLocaleDateString('zh-CN'), lookups: 1,
    });
    saveVocab(); renderVocab(); switchTab('vocab');
    saveBtn.textContent = '已收藏';
    saveBtn.classList.add('saved');
    showToast(`"${d.word}" 已加入单词本`);
  });
  saveDiv.appendChild(saveBtn);
  body.appendChild(saveDiv);

  document.getElementById('lookupResult').classList.add('show');
  document.getElementById('lookupResult').scrollIntoView({ behavior:'smooth', block:'nearest' });
}

// ── Translate ──────────────────────────────────────────────────────────────
async function translateText() {
  const text = document.getElementById('sentenceInput').value.trim();
  if (!text) { showToast('请输入要翻译的内容'); return; }
  if (!_safeStorage.getItem('sf_api_key')) {
    renderTranslate(getDemoTranslate(text), /[\u4e00-\u9fa5]/.test(text));
    showToast('当前展示的是试用翻译效果；接入 API 后可翻译你自己的句子');
    return;
  }

  setLoading(true, '翻译中...');

  // 判断语言方向
  const isChinese = /[\u4e00-\u9fa5]/.test(text);
  const direction = isChinese ? '中译英' : '英译中';

  const prompt = `你是一个专业翻译。请翻译以下${direction}内容：
"${text}"

以 JSON 格式返回（不要 markdown）：
{
  "source_lang": "${isChinese ? '中文' : '英文'}",
  "target_lang": "${isChinese ? '英文' : '中文'}",
  "standard": {
    "text": "<标准翻译>",
    "note": "<简短说明这种翻译的特点，例如：正式、通用>"
  },
  "casual": {
    "text": "<口语/日常翻译，更自然>",
    "note": "<说明特点>"
  },
  "formal": {
    "text": "<正式/书面翻译>",
    "note": "<说明特点>"
  }
}`;

  try {
    const raw  = await callAI(prompt);
    const data = JSON.parse(raw.replace(/```json|```/g,'').trim());
    renderTranslate(data, isChinese);
  } catch(err) {
    showToast('翻译失败：' + err.message);
  }
  setLoading(false, '翻  译');
}

function renderTranslate(d, isChinese) {
  const header = document.getElementById('trHeader');
  header.textContent = `${d.source_lang} → ${d.target_lang}`;

  const body = document.getElementById('trBody');
  body.innerHTML = '';
  if (d._demo) {
    const demoNote = document.createElement('div');
    demoNote.className = 'demo-note-box';
    demoNote.textContent = '当前是试用展示结果，用来让你先看翻译卡片、不同语气版本和朗读交互。接入 API 后，才会真正翻译你贴进去的句子。';
    body.appendChild(demoNote);
  }

  const variants = [
    { key:'standard', label:'标准翻译', cls:'style-standard' },
    { key:'casual',   label:'口语表达', cls:'style-casual' },
    { key:'formal',   label:'正式书面', cls:'style-formal' },
  ];

  variants.forEach(v => {
    const item = d[v.key];
    if (!item?.text) return;

    const div = document.createElement('div');
    div.className = 'translate-variant ' + v.cls;

    const textId   = `tr_${v.key}`;
    const speakId  = `trSpeak_${v.key}`;

    // 中译英：英文结果加 tokenize（可点击单词） + 朗读
    // 英译中：中文结果直接显示，不加朗读
    const isEnglishOutput = isChinese; // 中译英时输出是英文
    const textHTML = isEnglishOutput
      ? tokenize(item.text, v.cls === 'style-standard' ? 'blue' : v.cls === 'style-casual' ? 'green' : 'purple')
      : item.text;

    div.innerHTML = `
      <div class="translate-variant-label">${v.label}</div>
      <div class="translate-text" id="${textId}">${textHTML}</div>
      <div class="translate-note">${item.note||''}</div>
      ${isEnglishOutput ? `<button class="translate-speak" id="${speakId}">朗读</button>` : ''}`;

    body.appendChild(div);

    if (isEnglishOutput) {
      document.getElementById(speakId).addEventListener('click', () => speakText(item.text));
    }
  });

  // 绑定翻译结果里的单词点击
  bindWordTokens(body);

  document.getElementById('translateResult').classList.add('show');
  document.getElementById('translateResult').scrollIntoView({ behavior:'smooth', block:'nearest' });
}

  document.getElementById('submitBtn').disabled = true;

  bindWordTokens(body);

// ── Tokenize ───────────────────────────────────────────────────────────────
function tokenize(text, color) {
  const cls = color==='blue'   ? 'word-token word-token-blue'
            : color==='purple' ? 'word-token word-token-purple'
            : 'word-token';
  return text.replace(/([a-zA-Z']+)/g, w =>
    `<span class="${cls}" data-word="${w.replace(/'/g,'&#39;')}">${w}</span>`
  );
}

// 绑定 word-token 点击事件
function bindWordTokens(container) {
  container.querySelectorAll('.word-token').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      openWordPopup(e, el.dataset.word);
    });
  });
}

// ── Word popup — position:fixed 跟随单词正下方 ────────────────────────────
async function openWordPopup(e, word) {
  popupWord = word;
  const popup = document.getElementById('wordPopup');
  const rect  = e.target.getBoundingClientRect(); // viewport坐标

  // 先显示（需要 offsetWidth），设临时位置
  popup.style.display = 'block';
  popup.style.visibility = 'hidden';
  popup.style.top  = '0px';
  popup.style.left = '0px';

  document.getElementById('wpWord').textContent = word;
  document.getElementById('wpPron').textContent = '';
  document.getElementById('wpDef').textContent  = '查询中...';
  const exEl = document.getElementById('wpEx');
  exEl.style.display = 'none'; exEl.textContent = '';

  // 计算位置：单词正下方，position:fixed 直接用 viewport 坐标
  requestAnimationFrame(() => {
    const pw = popup.offsetWidth;
    const ph = popup.offsetHeight;
    let top  = rect.bottom + 8;
    let left = rect.left;
    // 防止超出右边
    if (left + pw > window.innerWidth - 8) left = window.innerWidth - pw - 8;
    // 防止超出下边，则显示在单词上方
    if (top + ph > window.innerHeight - 8) top = rect.top - ph - 8;
    popup.style.top  = top  + 'px';
    popup.style.left = Math.max(8, left) + 'px';
    popup.style.visibility = 'visible';
  });

  const key = word.toLowerCase();
  if (wordCache[key]) { applyWordData(wordCache[key]); return; }
  if (!_safeStorage.getItem('sf_api_key')) {
    applyWordData({
      pronunciation:'预览模式',
      definition:'这里是单词解析的展示位。接入 API 后，会显示真实释义、音标和一句例句。',
      example:'You can connect your API later and still keep browsing now.'
    });
    return;
  }

  try {
    const raw  = await callAI(`Define the English word "${word}" for a Chinese learner. Respond ONLY with JSON, no markdown:\n{"pronunciation":"<IPA>","definition":"<Chinese definition 1-2 sentences>","example":"<one short English example sentence>"}`);
    const data = JSON.parse(raw.replace(/```json|```/g,'').trim());
    wordCache[key] = data;
    applyWordData(data);
  } catch {
    document.getElementById('wpDef').textContent = '查询失败';
  }
}

function applyWordData(data) {
  document.getElementById('wpPron').textContent = data.pronunciation || '';
  document.getElementById('wpDef').textContent  = data.definition    || '';
  const exEl = document.getElementById('wpEx');
  if (data.example) { exEl.textContent = data.example; exEl.style.display = 'block'; }
}

function saveCurrentWord() {
  const word = document.getElementById('wpWord').textContent;
  if (!word) return;
  const existing = vocab.find(v => v.word.toLowerCase() === word.toLowerCase());
  if (existing) {
    existing.lookups = (existing.lookups||1) + 1;
    saveVocab(); renderVocab();
    showToast(`已在单词本中，查询次数 +1`); return;
  }
  vocab.unshift({
    id: Date.now(), word,
    pronunciation: document.getElementById('wpPron').textContent,
    definition:    document.getElementById('wpDef').textContent,
    example:       document.getElementById('wpEx').textContent,
    date: new Date().toLocaleDateString('zh-CN'),
    lookups: 1,
  });
  saveVocab(); renderVocab(); switchTab('vocab');
  document.getElementById('wordPopup').style.display = 'none';
  showToast(`"${word}" 已加入单词本`);
}

// ── TTS ────────────────────────────────────────────────────────────────────
let availableVoices = [];
let currentVoiceIndex = 0;

function initVoices() {
  const load = () => {
    const all = window.speechSynthesis.getVoices();
    // 只保留英语声音
    availableVoices = all.filter(v => v.lang.startsWith('en'));
    // 优先排序：en-US 本地声音 → en-US → en-GB → 其他英语
    availableVoices.sort((a,b) => {
      const score = v => (v.lang==='en-US'&&v.localService?0 : v.lang==='en-US'?1 : v.lang==='en-GB'?2 : 3);
      return score(a)-score(b);
    });
  };
  load();
  if (!availableVoices.length) window.speechSynthesis.onvoiceschanged = load;
}

function speakText(text) {
  if (!window.speechSynthesis) { showToast('浏览器不支持语音'); return; }
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-US';
  utt.rate = 0.88;
  if (availableVoices.length) utt.voice = availableVoices[currentVoiceIndex % availableVoices.length];
  window.speechSynthesis.speak(utt);
}

function switchVoice() {
  if (!availableVoices.length) { showToast('没有可用的英语音色'); return; }
  currentVoiceIndex = (currentVoiceIndex + 1) % availableVoices.length;
  const v = availableVoices[currentVoiceIndex];
  showToast(`音色：${v.name} (${v.lang})`);
}

// X5 重复朗读，每次间隔约等于句子朗读时间（通过 utterance onend 事件链式触发）
let repeatCount = 0;
let repeatTarget = '';
let repeatTotal = 0;

function speakRepeat(text, times) {
  if (!window.speechSynthesis) { showToast('浏览器不支持语音'); return; }
  window.speechSynthesis.cancel();
  repeatTarget = text;
  repeatTotal  = times;
  repeatCount  = 0;
  doRepeat();
}

function doRepeat() {
  if (repeatCount >= repeatTotal) { showToast('已完成 ×'+repeatTotal+' 朗读'); return; }
  repeatCount++;
  const utt = new SpeechSynthesisUtterance(repeatTarget);
  utt.lang = 'en-US';
  utt.rate = 0.88;
  if (availableVoices.length) utt.voice = availableVoices[currentVoiceIndex % availableVoices.length];
  // onend 后延迟一个句子等长时间再读下一遍
  utt.onend = () => {
    const delayMs = Math.max(800, repeatTarget.split(' ').length * 200);
    setTimeout(doRepeat, delayMs);
  };
  window.speechSynthesis.speak(utt);
  showToast(`朗读 ${repeatCount}/${repeatTotal}`);
}

// ── Sentences ──────────────────────────────────────────────────────────────
function saveSentence() {
  if (!currentFeedback) return;
  sentences.unshift({
    id:Date.now(), date:new Date().toLocaleDateString('zh-CN'),
    topic:currentFeedback.topic, original:currentFeedback.original,
    corrected:currentFeedback.corrected, score:currentFeedback.score,
  });
  saveSentences(); renderSidebar(); updateStats();
  const btn = document.getElementById('saveBtn');
  btn.textContent = '已保存'; btn.classList.add('saved');
  showToast('已保存到句子库');
}
function loadSentences() {
  try { sentences = JSON.parse(_safeStorage.getItem('sf_sentences')||'[]'); } catch { sentences=[]; }
  renderSidebar();
}
function saveSentences() { _safeStorage.setItem('sf_sentences', JSON.stringify(sentences)); }
function renderSidebar() {
  const list = document.getElementById('sentencesList');
  if (!sentences.length) { list.innerHTML=`<div class="empty-state"><div class="empty-icon">✍️</div><div class="empty-text">练习后点击保存，<br>句子会出现在这里</div></div>`; return; }
  const sc={5:'score-5',4:'score-4',3:'score-3',2:'score-2',1:'score-2'};
  list.innerHTML = sentences.map(s=>`
    <div class="sentence-card">
      <button class="del-btn" onclick="deleteSentence(${s.id},event)">✕</button>
      <div class="sc-orig">${s.original}</div>
      <div class="sc-corr">${s.corrected}</div>
      <div class="sc-meta"><span class="sc-date">${s.date}</span><span class="sentence-score score-badge ${sc[s.score]||'score-3'}">${s.score}/5</span></div>
    </div>`).join('');
}
function deleteSentence(id,e) { e.stopPropagation(); sentences=sentences.filter(s=>s.id!==id); saveSentences(); renderSidebar(); updateStats(); }
function clearAll() {
  if (!sentences.length) return;
  if (confirm(`确定清空全部 ${sentences.length} 个句子？`)) { sentences=[]; saveSentences(); renderSidebar(); updateStats(); showToast('已清空'); }
}

// ── Vocab ──────────────────────────────────────────────────────────────────
function loadVocab() {
  try { vocab = JSON.parse(_safeStorage.getItem('sf_vocab')||'[]'); } catch { vocab=[]; }
  renderVocab();
}
function saveVocab() { _safeStorage.setItem('sf_vocab', JSON.stringify(vocab)); }
function renderVocab() {
  const list = document.getElementById('vocabList');
  if (!vocab.length) { list.innerHTML=`<div class="empty-state"><div class="empty-icon">📖</div><div class="empty-text">点击句子里的单词，<br>可查解析并收藏</div></div>`; return; }
  list.innerHTML = vocab.map(v=>`
    <div class="vocab-card">
      <button class="del-btn" onclick="deleteVocab(${v.id},event)">✕</button>
      <div class="vc-word">${v.word}</div>
      ${v.pronunciation?`<div class="vc-pron">${v.pronunciation}</div>`:''}
      <div class="vc-def">${v.definition||''}</div>
      ${v.example?`<div class="vc-ex">${v.example}</div>`:''}
      <div class="vc-meta">
        <span class="vc-date">${v.date}</span>
        <span class="vc-lookup">查询 ${v.lookups||1} 次</span>
        <button class="vc-speak" data-word="${v.word}">发音</button>
      </div>
    </div>`).join('');
  list.querySelectorAll('.vc-speak').forEach(btn => btn.addEventListener('click', () => speakText(btn.dataset.word)));
}
function deleteVocab(id,e) { e.stopPropagation(); vocab=vocab.filter(v=>v.id!==id); saveVocab(); renderVocab(); }
function clearVocab() {
  if (!vocab.length) return;
  if (confirm(`确定清空全部 ${vocab.length} 个单词？`)) { vocab=[]; saveVocab(); renderVocab(); showToast('已清空'); }
}
function exportVocab() {
  if (!vocab.length) { showToast('单词本还是空的'); return; }
  let md=`# SentenceFlow 单词本\n\n导出：${new Date().toLocaleString('zh-CN')}\n共 ${vocab.length} 个\n\n---\n\n`;
  vocab.forEach((v,i)=>{ md+=`## ${i+1}. ${v.word}\n\n`; if(v.pronunciation)md+=`**发音**：${v.pronunciation}\n\n`; md+=`**释义**：${v.definition}\n\n`; if(v.example)md+=`**例句**：*${v.example}*\n\n`; md+=`---\n\n`; });
  dl(md,`Vocab_${new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')}.md`);
}

// ── Tabs ───────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.sidebar-tab').forEach((t,i)=>t.classList.toggle('active',i===(tab==='sentences'?0:1)));
  document.getElementById('tab-sentences').classList.toggle('active',tab==='sentences');
  document.getElementById('tab-vocab').classList.toggle('active',tab==='vocab');
}

// ── Stats & export ─────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('totalCount').textContent = sentences.length;
  document.getElementById('todayCount').textContent = parseInt(_safeStorage.getItem('sf_today_'+new Date().toDateString())||'0');
}
function exportSentences() {
  if (!sentences.length) { showToast('句子库还是空的'); return; }
  let md=`# SentenceFlow 句子库\n\n导出：${new Date().toLocaleString('zh-CN')}\n共 ${sentences.length} 个\n\n---\n\n`;
  sentences.forEach((s,i)=>{ md+=`## ${i+1}. ${s.date}\n\n**话题**：${s.topic}\n\n**原句**：~~${s.original}~~\n\n**修正**：${s.corrected}\n\n**得分**：${s.score}/5\n\n---\n\n`; });
  dl(md,`SentenceFlow_${new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')}.md`);
}
function dl(content, filename) {
  Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([content],{type:'text/markdown'})),download:filename}).click();
  showToast('导出成功');
}

// ── Toast ──────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
</script>

// ── Mobile overrides ──────────────────────────────────────────────────────

function openSidebar() {

function closeSidebar() {

// API setup - mobile uses bottom sheet style from existing api-setup overlay
// Already handled by existing openApiSetup/closeApiSetup in SF

// Override resetApiKey to show close button when key exists
const _sfOrigResetApiKey = window.resetApiKey;
function resetApiKey() {
  document.getElementById('apiKeyInput').value = '';
  selectProvider(_safeStorage.getItem('sf_provider') || 'openai');
  openApiSetup();
  const existingKey = _safeStorage.getItem('sf_api_key') || '';

  const configuredDiv = document.getElementById('apiAlreadyConfigured');
  const configuredInfo = document.getElementById('apiConfiguredInfo');
  if (existingKey && closeBtn) {
    closeBtn.style.display = 'block';
    if (configuredDiv) {
      const providerName = PROVIDERS[_safeStorage.getItem('sf_provider')||'openai']?.name || '';
      configuredInfo.textContent = providerName + ' · ' + existingKey.slice(0,6) + '••••' + existingKey.slice(-4);
      configuredDiv.style.display = 'block';
    }
  }
}
function closeApiSetup() {
  document.getElementById('apiSetup').style.display = 'none';
}

// Word popup position for mobile
function positionWordPopup() {
  const popup = document.getElementById('wordPopup');
  if (!popupAnchorEl || popup.style.display === 'none') return;
  const rect = popupAnchorEl.getBoundingClientRect();
  popup.style.position = 'fixed';
  const pw = popup.offsetWidth || 300;
  const ph = popup.offsetHeight || 200;
  let top  = rect.bottom + 8;
  let left = Math.max(16, Math.min(rect.left, window.innerWidth - pw - 16));
  if (top + ph > window.innerHeight - 16) top = Math.max(16, rect.top - ph - 8);
  popup.style.top  = top  + 'px';
  popup.style.left = left + 'px';
  popup.style.visibility = 'visible';
}

// Close word popup on outside tap
document.addEventListener('click', function(e) {
  const popup = document.getElementById('wordPopup');
  if (popup && popup.style.display !== 'none' && !popup.contains(e.target) && !e.target.classList.contains('word-token')) {
    popup.style.display = 'none';
    popupAnchorEl = null;
  }
});
</script>
